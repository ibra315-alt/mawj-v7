<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>موج — غير متصل</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:20px;
    background:#050c1a;color:#e8e0ff;font-family:'Noto Kufi Arabic',sans-serif;
    padding:24px;text-align:center;
  }
  .orb1{position:fixed;top:-10%;right:-5%;width:400px;height:400px;border-radius:50%;
    background:radial-gradient(circle,rgba(0,228,184,0.08) 0%,transparent 70%);pointer-events:none}
  .orb2{position:fixed;bottom:-10%;left:-5%;width:500px;height:500px;border-radius:50%;
    background:radial-gradient(circle,rgba(37,99,235,0.07) 0%,transparent 70%);pointer-events:none}
  .card{
    background:rgba(37,99,235,0.07);border:1.5px solid rgba(96,165,250,0.18);
    border-radius:24px;padding:40px 32px;max-width:340px;width:100%;
    backdrop-filter:blur(20px);
  }
  .icon{font-size:56px;margin-bottom:16px;display:block}
  h1{font-size:22px;font-weight:900;margin-bottom:8px;color:#e8e0ff}
  p{font-size:14px;color:#93b8f0;line-height:1.7;margin-bottom:24px}
  button{
    background:linear-gradient(135deg,#00e4b8,#2563eb);
    border:none;border-radius:999px;color:#050c1a;
    padding:12px 32px;font-size:14px;font-weight:800;
    cursor:pointer;font-family:inherit;
    box-shadow:0 4px 20px rgba(0,228,184,0.3);
    transition:transform 0.15s ease;
  }
  button:active{transform:scale(0.97)}
  .tip{font-size:12px;color:#5c7a9e;margin-top:16px}
</style>
</head>
<body>
<div class="orb1"></div>
<div class="orb2"></div>
<div class="card">
  <span class="icon">📡</span>
  <h1>أنت غير متصل بالإنترنت</h1>
  <p>تعذّر الاتصال بنظام موج. تحقق من اتصالك بالإنترنت وحاول مجدداً.</p>
  <button onclick="location.reload()">إعادة المحاولة</button>
  <p class="tip">💡 البيانات المحفوظة مسبقاً متاحة بعد الاتصال</p>
</div>
</body>
</html>
