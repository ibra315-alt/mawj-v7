<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>موج — غير متصل</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:20px;
    background:#FAFAF8;color:#1C1B19;font-family:'Almarai','Noto Kufi Arabic',sans-serif;
    padding:24px;text-align:center;
  }
  .orb1{position:fixed;top:-10%;right:-5%;width:400px;height:400px;border-radius:50%;
    background:radial-gradient(circle,rgba(56,189,248,0.08) 0%,transparent 70%);pointer-events:none}
  .orb2{position:fixed;bottom:-10%;left:-5%;width:500px;height:500px;border-radius:50%;
    background:radial-gradient(circle,rgba(59,130,246,0.07) 0%,transparent 70%);pointer-events:none}
  .card{
    background:#ffffff;border:1.5px solid #E8E8E4;
    border-radius:24px;padding:40px 32px;max-width:340px;width:100%;
    box-shadow:0 1px 3px rgba(15,14,12,0.04), 0 4px 16px rgba(15,14,12,0.06);
  }
  .icon{font-size:56px;margin-bottom:16px;display:block}
  h1{font-size:22px;font-weight:900;margin-bottom:8px;color:#1C1B19}
  p{font-size:14px;color:#5C5A55;line-height:1.7;margin-bottom:24px}
  button{
    background:linear-gradient(135deg,#38BDF8,#3B82F6);
    border:none;border-radius:999px;color:#ffffff;
    padding:12px 32px;font-size:14px;font-weight:800;
    cursor:pointer;font-family:inherit;
    box-shadow:0 4px 20px rgba(56,189,248,0.3);
    transition:transform 0.15s ease;
  }
  button:active{transform:scale(0.97)}
  .tip{font-size:12px;color:#A8A49E;margin-top:16px}
</style>
</head>
<body>
<div class="orb1"></div>
<div class="orb2"></div>
<div class="card">
  <span class="icon">📡</span>
  <h1>أنت غير متصل بالإنترنت</h1>
  <p>تعذّر الاتصال بنظام موج. تحقق من اتصالك بالإنترنت وحاول مجدداً.</p>
  <button onclick="location.reload()">إعادة المحاولة</button>
  <p class="tip">💡 البيانات المحفوظة مسبقاً متاحة بعد الاتصال</p>
</div>
</body>
</html>
